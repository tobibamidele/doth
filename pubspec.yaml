name: doth
description: >
  A multi-provider OAuth2 authentication library for Dart backends.
  Inspired by markbates/goth for Go — write once, plug in any provider.
  Compatible with shelf, dart_frog, alfred, and raw dart:io servers.
version: 1.0.0
repository: https://github.com/tobibamidele/doth

environment:
  sdk: ^3.10.4

dependencies:
  path: ^1.9.0
  http: ^1.6.0
  crypto: ^3.0.7
  jose: ^0.3.5
  # pointycastle: ^4.0.0
  shelf: ^1.4.2
  dart_jsonwebtoken: ^3.3.2

dev_dependencies:
  lints: ^6.0.0
  mocktail: ^1.0.4
  shelf_router: ^1.1.4
  test: ^1.25.6
